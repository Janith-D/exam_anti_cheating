spring.application.name=anti-cheating-backend
spring.datasource.url=jdbc:mysql://localhost:3306/anti_cheating_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
server.port=8080

# HikariCP settings to prevent connection pool issues
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.pool-name=HikariPool-1
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000

# File upload size limits (screenshots can be large)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ML service URL
ml.service.url=http://localhost:5000
ml.service.enabled=false

# JWT settings
# Secret key must be Base64 encoded and at least 512 bits (64 bytes) for HS512
# This is a properly encoded Base64 string that won't change on restart
jwt.secret=YW50aS1jaGVhdGluZy1leGFtLXN5c3RlbS1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tZ2VuZXJhdGlvbi1hbmQtdmFsaWRhdGlvbi0yMDI1LXNlY3VyZS1rZXk=
# Expiration set to 365 days (in milliseconds) - effectively no expiration for testing
jwt.expiration=31536000000

# Logging for debugging
logging.level.org.springframework=INFO
logging.level.com.example.anti_cheating_backend=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.zaxxer.hikari=INFO

# WebSocket settings
spring.websockets.allowed-origins=*
logging.level.org.springframework.web.socket=INFO
logging.level.com.example.anti_cheating_backend.websocket=INFO

# Frontend redirect URL used after OAuth2 login success/failure
app.frontend.oauth2.redirect=http://localhost:4200/oauth2/callback

# Google OAuth2 (set your values from Google Cloud Console)
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# External Services - auto-start with backend
# Paths are auto-detected from sibling directories, but can be overridden here
# external.ml-service.path=D:/PROJECT/Exam-Anti-Cheating/ml-service
# external.desktop-monitor.path=D:/PROJECT/Exam-Anti-Cheating/desktop-monitor

# Speed up backend startup in IDE by default.
# Enable these only when you need auto-launch of Python services.
external.ml-service.enabled=false
external.desktop-monitor.enabled=false